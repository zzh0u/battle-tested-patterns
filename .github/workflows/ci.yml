name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm verify-mermaid

  # verify-code needs ALL four toolchains so that the Rust/Go/Python code blocks
  # in the docs are genuinely compiled (not silently skipped). The script fails
  # hard in CI (env CI=true) if any toolchain is missing.
  verify-code:
    name: Verify Code Blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false # verify-code uses a temp module; no go.sum to cache
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify-code

  test-ts:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:exercises

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cd exercises/rust && cargo test

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: exercises/go/go.mod
      - run: cd exercises/go && go test ./...

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r exercises/python/requirements.txt
      - run: cd exercises/python && pytest -v

  test-components:
    name: Test (Vue Components)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:docs

  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  # ─── Content Quality Checks ───────────────────────────────────────────
  # Unified content quality gate: structure, parity, exercises, relations.
  # Replaces former check-template / check-zh-parity / check-frontmatter /
  # check-tab-order / check-exercises heredoc jobs with typed, locally-runnable scripts.

  check-content:
    name: Content Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:content

  # ─── Gate Job ────────────────────────────────────────────────────────────
  # Branch Protection only needs to require this single check: "CI / CI Pass"
  # All individual jobs above run in parallel; this job waits for all of them.
  ci-pass:
    name: CI Pass
    if: always()
    needs:
      [
        lint,
        verify-code,
        test-ts,
        test-rust,
        test-go,
        test-python,
        test-components,
        build,
        check-content,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed ✓"
